/* 今日の日付 */

function getTodayStages(){

    const now = new Date();

    const month =
        now.getMonth() + 1;

    const date =
        now.getDate();

    const today =
        month + "/" + date;

    return stages[today];
}

/* タイムテーブル表示 */

function createTimetable(){

    const todayStages =
        getTodayStages();

    if(!todayStages) return;

    let html = "";

    todayStages.forEach(stage=>{

        html += `

        <div class="stage-card">

            <div class="stage-time">
                ${stage.start}〜${stage.end}
            </div>

            <div class="stage-name">
                ${stage.name}
            </div>

            <div class="stage-place">
                ${stage.type}
            </div>

        </div>
        `;
    });

    document
    .getElementById("timetable")
    .innerHTML = html;
}

/* 現在公演 */

function updateStage(){

    const todayStages =
        getTodayStages();

    if(!todayStages){

        document.getElementById("now-stage")
            .innerText =
            "本日の公演はありません";

        document.getElementById("next-stage")
            .innerText =
            "本日の公演はありません";

        return;
    }

    const now = new Date();

    const currentMinutes =
        now.getHours() * 60
      + now.getMinutes();

    let currentStage =
        "現在公演はありません";

    let nextStage =
        "本日の公演は終了しました";

    for(let i = 0; i < todayStages.length; i++){

        const stage =
            todayStages[i];

        const start =
            timeToMinutes(stage.start);

        const end =
            timeToMinutes(stage.end);

        if(
            currentMinutes >= start
            &&
            currentMinutes < end
        ){

            currentStage =
`${stage.name}
【${stage.type}】
${stage.start}〜${stage.end}`;

            if(i + 1 < todayStages.length){

                const next =
                    todayStages[i + 1];

                nextStage =
`${next.name}
【${next.type}】
${next.start}〜${next.end}`;
            }

            break;
        }

        if(currentMinutes < start){

            nextStage =
`${stage.name}
【${stage.type}】
${stage.start}〜${stage.end}`;

            break;
        }
    }

    document.getElementById("now-stage")
        .innerText = currentStage;

    document.getElementById("next-stage")
        .innerText = nextStage;
}
