<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 | 南高祭2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:400px; max-height:80vh; overflow-y:auto; background:white; padding:20px; border-radius:20px; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9998; }
    </style>
</head>
<body class="bg-slate-900 text-slate-800 pb-20">

    <header class="bg-blue-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">管理画面</h1>
    </header>

    <div class="max-w-xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <a href="index.html" class="text-slate-300 hover:text-white underline">← ホームへ戻る</a>
        </div>

        <!-- 待ち時間管理 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
            <h2 class="text-xl font-bold text-blue-900 mb-4 border-b pb-2">待ち時間管理</h2>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-slate-100 p-4 rounded-xl font-bold hover:bg-slate-200" onclick="openPopup('grade1')">1年</button>
                <button class="bg-slate-100 p-4 rounded-xl font-bold hover:bg-slate-200" onclick="openPopup('grade2')">2年</button>
                <button class="bg-slate-100 p-4 rounded-xl font-bold hover:bg-slate-200" onclick="openPopup('grade3')">3年</button>
                <button class="bg-blue-50 p-4 rounded-xl font-bold hover:bg-blue-100 text-blue-900" onclick="openPopup('clubs')">部活・その他</button>
            </div>
        </div>

        <!-- お知らせ管理 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg mb-6 border-l-4 border-red-500">
            <h2 class="text-xl font-bold text-slate-800 mb-4">リアルタイムお知らせ</h2>
            <input type="text" id="newsInput" class="w-full p-3 border rounded-xl mb-3" placeholder="お知らせを入力">
            <button onclick="saveNews()" class="w-full bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700">お知らせ保存</button>
            <div id="newsList" class="mt-4 space-y-2"></div>
        </div>

        <!-- 迷子・落とし物 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-bold text-slate-800 mb-4">迷子・落とし物 管理</h2>
            <input type="text" id="itemName" class="w-full p-3 border rounded-xl mb-2" placeholder="名称（例：青い財布）">
            <input type="text" id="itemLocation" class="w-full p-3 border rounded-xl mb-2" placeholder="場所（例：体育館入口）">
            <select id="itemType" class="w-full p-3 border rounded-xl mb-3"><option value="落とし物">落とし物</option><option value="迷子">迷子</option></select>
            <button onclick="saveItem()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-black">登録する</button>
            <div id="lostItemsList" class="mt-4 border-t pt-4 space-y-2"></div>
        </div>
    </div>

    <!-- ポップアップ -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div class="popup" id="grade1"><h2>1年 クラス一覧</h2><div id="grade1-classes" class="mt-4"></div><button class="w-full mt-4 p-3 bg-slate-200 rounded-xl" onclick="closePopup()">閉じる</button></div>
    <div class="popup" id="grade2"><h2>2年 クラス一覧</h2><div id="grade2-classes" class="mt-4"></div><button class="w-full mt-4 p-3 bg-slate-200 rounded-xl" onclick="closePopup()">閉じる</button></div>
    <div class="popup" id="grade3"><h2>3年 クラス一覧</h2><div id="grade3-classes" class="mt-4"></div><button class="w-full mt-4 p-3 bg-slate-200 rounded-xl" onclick="closePopup()">閉じる</button></div>
    <div class="popup" id="clubs"><h2>部活動・団体 一覧</h2><div id="clubs-classes" class="mt-4"></div><button class="w-full mt-4 p-3 bg-slate-200 rounded-xl" onclick="closePopup()">閉じる</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" }));

    // クラス・部活動生成
    for (let g = 1; g <= 3; g++) {
        const container = document.getElementById(`grade${g}-classes`);
        for (let c = 1; c <= 8; c++) {
            const className = `${g}年${c}組`;
            container.innerHTML += `<div class="mb-3 p-2 bg-slate-50 rounded-lg"><strong>${className}</strong><input type="number" id="input-${className}" class="w-full p-2 border rounded-lg mt-1" placeholder="待ち組数"><button onclick="saveData('${className}', 'input-${className}')" class="mt-2 w-full bg-blue-700 text-white p-2 rounded-lg font-bold">保存</button></div>`;
        }
    }
    const clubs = ["書道部", "吹奏楽部", "科学部", "華道部", "クイズ研究会", "図書局", "語学・言語学研究会", "生物研究会", "茶道部", "プログラミング研究会", "漫画・アニメーション研究会", "よろずや同好会"];
    const clubContainer = document.getElementById(`clubs-classes`);
    clubs.forEach(name => {
        clubContainer.innerHTML += `<div class="mb-3 p-2 bg-slate-50 rounded-lg"><strong>${name}</strong><input type="number" id="input-${name}" class="w-full p-2 border rounded-lg mt-1" placeholder="待ち組数"><button onclick="saveData('${name}', 'input-${name}')" class="mt-2 w-full bg-blue-700 text-white p-2 rounded-lg font-bold">保存</button></div>`;
    });

    window.openPopup = (id) => { document.getElementById(id).style.display = "block"; document.getElementById("overlay").style.display = "block"; };
    window.closePopup = () => { document.querySelectorAll(".popup").forEach(p => p.style.display = "none"); document.getElementById("overlay").style.display = "none"; };
    window.saveData = async (className, inputId) => { 
        const groups = Number(document.getElementById(inputId).value); 
        await set(ref(db, "vacancy/" + className), { className, groups, waitTime: groups * 5 }); 
        alert(className + " を更新しました！"); 
    };
    
    window.saveNews = async () => { 
        const input = document.getElementById("newsInput");
        if(input.value) { await push(ref(db, "news"), { text: input.value }); input.value = ""; }
    };

    window.saveItem = async () => { 
        const title = document.getElementById("itemName").value; 
        const location = document.getElementById("itemLocation").value; 
        const type = document.getElementById("itemType").value; 
        await push(ref(db, "lostItems"), { title, location, type, status: type === "迷子" ? "保護中" : "保管中" }); 
        alert("登録しました"); 
    };

    onValue(ref(db, "news"), (snapshot) => {
        const list = document.getElementById("newsList");
        list.innerHTML = "";
        const data = snapshot.val();
        if(data) Object.entries(data).reverse().forEach(([key, val]) => {
            list.innerHTML += `<div class="flex items-center justify-between p-3 bg-red-50 rounded-xl text-sm border border-red-100">${val.text}<button onclick="remove(ref(db, 'news/${key}'))" class="text-red-500 font-bold ml-2">✕</button></div>`;
        });
    });

    onValue(ref(db, "lostItems"), (snapshot) => {
        const list = document.getElementById("lostItemsList");
        list.innerHTML = "";
        const data = snapshot.val();
        if(data) Object.entries(data).reverse().forEach(([key, val]) => {
            list.innerHTML += `<div class="flex items-center justify-between p-2 text-sm border-b"><span><strong>${val.type}:</strong> ${val.title} (${val.location})</span><button onclick="remove(ref(db, 'lostItems/${key}'))" class="text-slate-400 font-bold ml-2">✕</button></div>`;
        });
    });
</script>
</body>
</html>
