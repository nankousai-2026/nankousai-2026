<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面 | 南高祭2026</title>
    <style>
        body { margin:0; background:#f5f5f5; font-family:sans-serif; padding-bottom: 50px; }
        header { background:#00469b; color:white; padding:20px; text-align:center; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .class-box { background:white; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .class-title { font-size:1.2rem; font-weight:bold; color:#00469b; margin-bottom:10px; }
        input, select { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
        button { width:100%; padding:12px; border:none; border-radius:10px; background:#00469b; color:white; font-weight:bold; cursor:pointer; }
        
        /* 枠付きお知らせデザイン */
        .news-card { position: relative; background: #fffdf0; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; }
        .news-text { flex-grow: 1; font-size: 0.95rem; color: #333; }
        .delete-btn { background: #ff4d4d; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 15px; }
        
        .list-item { display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .list-text { flex-grow: 1; word-break: break-all; font-size: 0.95rem; }
        
        .grade-container { display:flex; justify-content:center; gap:10px; margin: 20px 0; }
        .grade-btn { background: white; padding: 15px; border-radius: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight:bold; }
        .popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:400px; max-height:80vh; overflow-y:auto; background:white; padding:20px; border-radius:20px; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998; }
        .close-btn { background:#999; margin-top: 10px; width: 100%; padding: 10px; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<header><h1>管理画面</h1></header>

<div class="container">
    <div style="text-align:center; margin: 20px 0;"><a href="index.html">← ホームへ戻る</a></div>

    <div class="class-box">
        <div class="class-title">リアルタイムお知らせ</div>
        <input type="text" id="newsInput" placeholder="お知らせを入力">
        <button onclick="saveNews()">お知らせ保存</button>
        <div id="newsList" style="margin-top:15px;"></div>
    </div>

    <div class="class-box">
        <div class="class-title">待ち時間管理</div>
        <div class="grade-container">
            <div class="grade-btn" onclick="openPopup('grade1')">1年</div>
            <div class="grade-btn" onclick="openPopup('grade2')">2年</div>
            <div class="grade-btn" onclick="openPopup('grade3')">3年</div>
        </div>
    </div>

    <div class="class-box">
        <div class="class-title">迷子・落とし物 管理</div>
        <input type="text" id="itemName" placeholder="名称（例：青い財布）">
        <input type="text" id="itemLocation" placeholder="場所（例：体育館入口）">
        <select id="itemType"><option value="落とし物">落とし物</option><option value="迷子">迷子</option></select>
        <button onclick="saveItem()">情報を登録する</button>
        <div id="lostItemsList" style="margin-top:15px; border-top:1px solid #eee;"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="grade1"><h2>1年 クラス一覧</h2><div id="grade1-classes"></div><button class="close-btn" onclick="closePopup()">閉じる</button></div>
<div class="popup" id="grade2"><h2>2年 クラス一覧</h2><div id="grade2-classes"></div><button class="close-btn" onclick="closePopup()">閉じる</button></div>
<div class="popup" id="grade3"><h2>3年 クラス一覧</h2><div id="grade3-classes"></div><button class="close-btn" onclick="closePopup()">閉じる</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" }));

    for (let g = 1; g <= 3; g++) {
        const container = document.getElementById(`grade${g}-classes`);
        for (let c = 1; c <= 8; c++) {
            const className = `${g}年${c}組`;
            container.innerHTML += `<div class="class-box" style="padding:10px; margin-bottom:10px;"><strong>${className}</strong><input type="number" id="input-${g}-${c}" placeholder="待ち組数" style="margin:5px 0;"><button onclick="saveData('${className}', 'input-${g}-${c}')">保存</button></div>`;
        }
    }

    window.openPopup = (id) => { document.getElementById(id).style.display = "block"; document.getElementById("overlay").style.display = "block"; };
    window.closePopup = () => { document.querySelectorAll(".popup").forEach(p => p.style.display = "none"); document.getElementById("overlay").style.display = "none"; };
    window.saveData = async (className, inputId) => { const groups = Number(document.getElementById(inputId).value); await set(ref(db, "vacancy/" + className), { className, groups, waitTime: groups * 5 }); alert(className + " を保存しました！"); };
    
    window.saveNews = async () => { 
        const input = document.getElementById("newsInput");
        if(input.value) {
            await push(ref(db, "news"), { text: input.value }); 
            input.value = ""; 
        }
    };
    window.deleteNews = async (key) => { await remove(ref(db, "news/" + key)); };
    window.saveItem = async () => { const title = document.getElementById("itemName").value; const location = document.getElementById("itemLocation").value; const type = document.getElementById("itemType").value; await push(ref(db, "lostItems"), { title, location, type, status: type === "迷子" ? "保護中" : "保管中" }); alert("登録しました"); };
    window.deleteItem = async (key) => { await remove(ref(db, "lostItems/" + key)); };

    // お知らせリスナー（枠付きデザインで表示）
    onValue(ref(db, "news"), (snapshot) => {
        const list = document.getElementById("newsList");
        list.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.entries(data).reverse().forEach(([key, val]) => {
                const div = document.createElement("div");
                div.className = "news-card";
                div.innerHTML = `<span class="news-text">${val.text}</span><button class="delete-btn" onclick="deleteNews('${key}')">✕</button>`;
                list.appendChild(div);
            });
        }
    });

    onValue(ref(db, "lostItems"), (snapshot) => {
        const list = document.getElementById("lostItemsList");
        list.innerHTML = "";
        const data = snapshot.val();
        if(data) Object.entries(data).reverse().forEach(([key, val]) => {
            const div = document.createElement("div");
            div.className = "list-item";
            div.innerHTML = `<span class="list-text"><strong>${val.type}:</strong> ${val.title} (${val.location})</span><button class="delete-btn" onclick="deleteItem('${key}')" style="background:#666;">✕</button>`;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
