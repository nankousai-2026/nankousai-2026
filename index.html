<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>札幌南高校　2026　文化祭　公式サイト　南高祭2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .yuji { font-family: 'Yuji Syuku', serif; }
        
        /* フェードアニメーション用スタイル */
        .carousel-item {
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .carousel-item.active {
            opacity: 1;
            position: relative;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // お知らせの監視
        onValue(ref(db, 'news'), (snapshot) => {
            const data = snapshot.val();
            const noticeBox = document.getElementById('important-news');
            if (data) {
                const newsArray = Object.values(data);
                noticeBox.innerHTML = newsArray.reverse().map(n => `<p class="mb-1">・${n.text}</p>`).join('');
            } else {
                noticeBox.innerHTML = "<p>現在、重要なお知らせはありません。</p>";
            }
        });

        // 公演情報の監視
        onValue(ref(db, 'status'), (snapshot) => {
            const data = snapshot.val();
            const updateStage = (idNow, idNext, stageData) => {
                const nowEl = document.getElementById(idNow);
                const nextEl = document.getElementById(idNext);
                if (stageData && stageData.now) {
                    nowEl.innerText = stageData.now;
                    nextEl.innerText = stageData.next || "予定なし";
                } else {
                    nowEl.innerText = "公演はありません。";
                    nextEl.innerText = "公演はありません。";
                }
            };
            updateStage('gym-now', 'gym-next', data?.gym);
            updateStage('hall-now', 'hall-next', data?.hall);
        });

        // 注目スポットカルーセル機能 (フェード用)
        let currentIndex = 0;
        const items = document.querySelectorAll('.carousel-item');
        
        function showNext() {
            items[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % items.length;
            items[currentIndex].classList.add('active');
        }
        setInterval(showNext, 5000);
    </script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="relative h-[400px] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-slate-800"></div>
        <a href="admin.html" class="absolute top-5 right-5 text-white/70 hover:text-white text-sm bg-white/10 px-4 py-2 rounded-full backdrop-blur z-50">管理者ログイン</a>
        <div class="relative text-center z-10 p-6">
            <h1 class="yuji text-5xl md:text-6xl font-bold mb-4">南高祭 2026</h1>
            <p class="text-yellow-300 text-lg md:text-xl font-bold">一南去って、また一南〜終わらない祭り〜</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold mb-6 text-center">リアルタイム情報</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-slate-800 mb-12">
            <div class="bg-white p-6 rounded-2xl border-l-4 border-blue-600 shadow-lg">
                <h4 class="font-bold text-blue-800 mb-2 border-b pb-1">第一体育館</h4>
                <p class="text-sm">現在：<span id="gym-now" class="font-bold">読込中...</span></p>
                <p class="text-sm text-slate-500">次：<span id="gym-next">読込中...</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl border-l-4 border-blue-600 shadow-lg">
                <h4 class="font-bold text-blue-800 mb-2 border-b pb-1">1Fホール</h4>
                <p class="text-sm">現在：<span id="hall-now" class="font-bold">読込中...</span></p>
                <p class="text-sm text-slate-500">次：<span id="hall-next">読込中...</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl border-l-4 border-red-500 shadow-lg">
                <h4 class="font-bold text-red-600 mb-2 border-b pb-1">重要なお知らせ</h4>
                <div id="important-news" class="text-sm text-slate-700">読込中...</div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-6 text-center">注目スポット</h2>
        <div class="bg-white/10 p-8 rounded-2xl border border-white/10 mb-12 flex items-center justify-center text-center h-[120px]">
            <div id="carousel" class="relative w-full">
                <div class="carousel-item active">
                    <h4 class="font-bold text-yellow-300 mb-2">注目スポット①</h4>
                    <p class="text-sm">3F図書室にて、古本市を開催中！お宝が見つかるかも？</p>
                </div>
                <div class="carousel-item">
                    <h4 class="font-bold text-yellow-300 mb-2">注目スポット②</h4>
                    <p class="text-sm">中庭でキッチンカー出店中！限定メニューを堪能しよう。</p>
                </div>
                <div class="carousel-item">
                    <h4 class="font-bold text-yellow-300 mb-2">注目スポット③</h4>
                    <p class="text-sm">化学室にて、実験教室実施中！参加費無料です。</p>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-6 text-center">コンテンツメニュー</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <a href="stage.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">ステージ発表</a>
            <a href="street.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">ストリート発表</a>
            <a href="exhibition.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">展示一覧</a>
            <a href="rally.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">スタンプラリー</a>
            <a href="map.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">会場マップ</a>
            <a href="access.html" class="bg-white/10 hover:bg-white/20 p-4 rounded-xl text-center transition">交通アクセス</a>
            <a href="maigo.html" class="bg-orange-500/20 hover:bg-orange-500/40 border border-orange-500/50 p-4 rounded-xl text-center transition col-span-2 md:col-span-1">迷子・落とし物</a>
        </div>
    </div>
</body>
</html>
