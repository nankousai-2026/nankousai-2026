<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷子・落とし物センター | 南高祭2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f5f7fb; font-family: sans-serif; }
        .page-header { background: #00469b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .site-title { color: white; text-decoration: none; font-size: 1.5rem; font-family: "Yuji Syuku", serif; }
        .menu-button { color: white; font-size: 2rem; cursor: pointer; }
        #menu { display: none; position: absolute; top: 70px; right: 20px; background: white; border-radius: 15px; overflow: hidden; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #menu a { display: block; padding: 15px 30px; color: #00469b; text-decoration: none; }
        #menu a:hover { background: #00469b; color: white; }
        
        .main-content { margin-top: 40px; text-align: center; }
        .page-title { color: #00469b; margin-bottom: 20px; }
        .section-label { color: #555; font-weight: bold; margin-bottom: 10px; display: block; font-size: 1.3rem; letter-spacing: 0.1em; }
        
        .search-box { width: 90%; max-width: 600px; display: block; margin: 20px auto; padding: 15px; border-radius: 15px; border: 1px solid #ccc; }
        .card-area { width: 95%; max-width: 800px; margin: 20px auto; display: grid; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); border-left: 10px solid #00469b; text-align: left; }
        .status-tag { display: inline-block; padding: 5px 10px; border-radius: 5px; color: white; font-size: 0.8rem; margin-bottom: 10px; }
        .found { background: #5cb85c; }
        .lost { background: #f0ad4e; }
    </style>
</head>
<body>

<header class="page-header">
    <a href="index.html" class="site-title">南高祭2026</a>
    <div class="menu-button" id="menuButton">☰</div>
</header>

<nav id="menu">
    <a href="index.html">ホーム</a>
    <a href="access.html">交通アクセス</a>
    <a href="map.html">会場マップ</a>
    <a href="stage.html">ステージ発表</a>
    <a href="street.html">ストリート発表</a>
    <a href="exhibition.html">展示一覧</a>
    <a href="rule.html">校内ルール</a>
</nav>

<div class="main-content">
    <span class="section-label">迷子・落とし物情報センター</span>
    <h1 class="page-title">現在の保護情報</h1>

    <input type="text" id="search" class="search-box" placeholder="場所や特徴で検索...">

    <div class="card-area" id="cardArea">
        <!-- JSで動的にFirebaseのデータを表示 -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" }));

    let allItems = [];

    // Firebaseからデータを取得
    onValue(ref(db, "lostItems"), (snapshot) => {
        const data = snapshot.val();
        allItems = data ? Object.values(data) : [];
        renderCards();
    });

    function renderCards(filter = "") {
        const area = document.getElementById("cardArea");
        const filtered = allItems.filter(i => 
            (i.title && i.title.includes(filter)) || 
            (i.location && i.location.includes(filter))
        );

        area.innerHTML = filtered.map(i => `
            <div class="card">
                <div class="status-tag ${i.type === '迷子' ? 'lost' : 'found'}">${i.status}</div>
                <h2 style="margin:0">${i.title}</h2>
                <p>発見場所: ${i.location}</p>
            </div>
        `).join("");
    }

    document.getElementById("menuButton").onclick = () => {
        const m = document.getElementById("menu");
        m.style.display = m.style.display === "block" ? "none" : "block";
    };

    document.getElementById("search").oninput = (e) => renderCards(e.target.value);
</script>
</body>
</html>
