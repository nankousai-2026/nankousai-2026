<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷子・落とし物センター | 南高祭2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .yuji { font-family: 'Yuji Syuku', serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <header class="bg-slate-800 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center relative">
            <a href="index.html" class="yuji text-2xl font-bold text-white hover:text-blue-300 transition">南高祭2026</a>
            <button onclick="toggleMenu()" class="text-2xl hover:text-blue-300 transition p-2 z-50">☰</button>
            
            <nav id="menu" class="hidden absolute top-16 right-0 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50 overflow-hidden">
                <a href="index.html" class="block px-6 py-3 hover:bg-slate-700 transition">ホーム</a>
                <a href="exhibition.html" class="block px-6 py-3 hover:bg-slate-700 transition">展示一覧</a>
                <a href="access.html" class="block px-6 py-3 hover:bg-slate-700 transition">交通アクセス</a>
                <a href="stage.html" class="block px-6 py-3 hover:bg-slate-700 transition">ステージ発表</a>
                <a href="street.html" class="block px-6 py-3 hover:bg-slate-700 transition">ストリート発表</a>
                <a href="map.html" class="block px-6 py-3 hover:bg-slate-700 transition">会場マップ</a>
                <a href="maigo.html" class="block px-6 py-3 hover:bg-slate-700 transition text-blue-400">迷子・落とし物</a>
                <a href="rally.html" class="block px-6 py-3 hover:bg-slate-700 transition">スタンプラリー</a>
                <a href="rule.html" class="block px-6 py-3 hover:bg-slate-700 transition">校内ルール</a>
            </nav>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="yuji text-3xl font-bold mb-2">迷子・落とし物情報センター</h1>
        </div>

        <div class="mb-8">
            <input type="text" id="search" 
                class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                placeholder="場所や特徴で検索...">
        </div>

        <div id="cardArea" class="grid gap-4">
            <p class="text-center text-slate-500 py-10">データを読み込んでいます...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // メニュー開閉関数
        window.toggleMenu = () => { document.getElementById("menu").classList.toggle("hidden"); };

        const db = getDatabase(initializeApp({ 
            databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" 
        }));

        let allItems = [];

        onValue(ref(db, "lostItems"), (snapshot) => {
            const data = snapshot.val();
            allItems = data ? Object.values(data) : [];
            renderCards();
        });

        function renderCards(filter = "") {
            const area = document.getElementById("cardArea");
            const filtered = allItems.filter(i => 
                (i.title && i.title.includes(filter)) || 
                (i.location && i.location.includes(filter))
            );

            if (filtered.length === 0) {
                area.innerHTML = "<p class='text-center text-slate-500 py-10'>現在、該当する情報はありません。</p>";
                return;
            }

            area.innerHTML = filtered.map(i => `
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                    <span class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-3 ${i.type === '迷子' ? 'bg-orange-500/20 text-orange-300 border border-orange-500/50' : 'bg-blue-500/20 text-blue-300 border border-blue-500/50'}">
                        ${i.status}
                    </span>
                    <h2 class="text-xl font-bold mb-1">${i.title}</h2>
                    <p class="text-sm text-slate-300">発見場所: ${i.location}</p>
                </div>
            `).join("");
        }

        document.getElementById("search").oninput = (e) => renderCards(e.target.value);
    </script>
</body>
</html>
