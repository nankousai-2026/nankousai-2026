<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷子・落とし物センター | 南高祭2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .yuji { font-family: 'Yuji Syuku', serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <header class="relative p-6 flex justify-between items-center z-50">
        <a href="index.html" class="yuji text-3xl font-bold">南高祭 2026</a>
        <button id="menuButton" class="text-3xl p-2 z-50 relative">☰</button>
    </header>

    <nav id="menu" class="hidden absolute top-20 right-6 bg-white text-slate-900 rounded-2xl shadow-xl overflow-hidden z-40 w-48">
        <a href="index.html" class="block px-6 py-4 hover:bg-slate-100">ホーム</a>
        <a href="stage.html" class="block px-6 py-4 hover:bg-slate-100">ステージ発表</a>
        <a href="street.html" class="block px-6 py-4 hover:bg-slate-100">ストリート発表</a>
        <a href="exhibition.html" class="block px-6 py-4 hover:bg-slate-100">展示一覧</a>
        <a href="rally.html" class="block px-6 py-4 hover:bg-slate-100">スタンプラリー</a>
        <a href="map.html" class="block px-6 py-4 hover:bg-slate-100">会場マップ</a>
        <a href="access.html" class="block px-6 py-4 hover:bg-slate-100">交通アクセス</a>
    </nav>

    <main class="max-w-2xl mx-auto px-4 pb-12">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2">迷子・落とし物情報センター</h1>
        </div>

        <div class="mb-8">
            <input type="text" id="search" 
                class="w-full p-4 rounded-xl bg-white/10 border border-white/10 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                placeholder="場所や特徴で検索...">
        </div>

        <div id="cardArea" class="grid gap-4">
            <p class="text-center text-slate-500 py-10">データを読み込んでいます...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase(initializeApp({ 
            databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" 
        }));

        document.getElementById("menuButton").onclick = () => {
            const m = document.getElementById("menu");
            m.classList.toggle("hidden");
        };

        let allItems = [];

        onValue(ref(db, "lostItems"), (snapshot) => {
            const data = snapshot.val();
            allItems = data ? Object.values(data) : [];
            renderCards();
        });

        function renderCards(filter = "") {
            const area = document.getElementById("cardArea");
            const filtered = allItems.filter(i => 
                (i.title && i.title.includes(filter)) || 
                (i.location && i.location.includes(filter))
            );

            if (filtered.length === 0) {
                area.innerHTML = "<p class='text-center text-slate-500 py-10'>現在、該当する情報はありません。</p>";
                return;
            }

            area.innerHTML = filtered.map(i => `
                <div class="bg-white/10 p-6 rounded-xl border border-white/10 shadow-lg">
                    <span class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-3 ${i.type === '迷子' ? 'bg-orange-500/20 text-orange-300 border border-orange-500/50' : 'bg-blue-500/20 text-blue-300 border border-blue-500/50'}">
                        ${i.status}
                    </span>
                    <h2 class="text-xl font-bold mb-1">${i.title}</h2>
                    <p class="text-sm text-slate-300">発見場所: ${i.location}</p>
                </div>
            `).join("");
        }

        document.getElementById("search").oninput = (e) => renderCards(e.target.value);
    </script>
</body>
</html>
