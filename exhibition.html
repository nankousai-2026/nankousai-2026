let vacancyData = {};

let activeFilters = [];

function createCards(){

let html = "";

const keyword =
document
.getElementById("search")
.value
.toLowerCase();

const sortedExhibitions =
[...exhibitions].sort((a,b)=>
a.name.localeCompare(
b.name,
"ja"
));

const filteredExhibitions =
sortedExhibitions.filter(item=>{

const matchKeyword =

item.name
.toLowerCase()
.includes(keyword)

||

item.summary
.toLowerCase()
.includes(keyword)

||

item.room
.toLowerCase()
.includes(keyword);

const matchFilter =

activeFilters.length === 0

||

activeFilters.includes(item.category)

||

activeFilters.includes(item.grade);

return matchKeyword && matchFilter;

});

filteredExhibitions.forEach(item=>{

html += `

<div class="card">

<img src="${item.image}">

<div class="card-body">

<div class="card-title">
${item.name}
</div>

<div class="tag">
${item.category}
</div>

<div class="tag">
${item.grade}
</div>

<div class="info">

🏫 ${item.room}<br>

⏰ ${getWaitTime(item.className)}

</div>

<div class="description">
${item.summary}
</div>

</div>

</div>

`;

});

document
.getElementById("cardArea")
.innerHTML = html;

}

const vacancyRef =
ref(db,"vacancy");

onValue(vacancyRef,(snapshot)=>{

vacancyData =
snapshot.val() || {};

createCards();

});

document
.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

const filter =
button.innerText;

if(activeFilters.includes(filter)){

activeFilters =
activeFilters.filter(
f => f !== filter
);

button.classList.remove("active");

}else{

activeFilters.push(filter);

button.classList.add("active");

}

createCards();

});

});

function toggleMenu(){

const menu =
document.getElementById("menu");

menu.style.display =
menu.style.display === "block"
? "none"
: "block";

}

function getWaitTime(className){

if(!className){

return "待ち時間なし";

}

const item =
vacancyData[className];

if(!item){

return "ーーー";

}

return "約" + item.waitTime + "分";

}

document
.getElementById("search")
.addEventListener(
"input",
createCards
);

document
.getElementById("menuButton")
.addEventListener("click",toggleMenu);
