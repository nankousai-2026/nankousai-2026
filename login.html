<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者ログイン | 南高祭2026</title>
    <style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f4f6fb;

    font-family:sans-serif;
}

.login-box{

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:
        0 5px 20px rgba(0,0,0,0.15);

    width:350px;

    text-align:center;
}

h1{

    color:#00469b;

    margin-bottom:30px;
}

input{

    width:100%;

    padding:15px;

    font-size:1rem;

    border:1px solid #ccc;

    border-radius:10px;

    margin-bottom:20px;

    box-sizing:border-box;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#00469b;

    color:white;

    font-size:1rem;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#00357a;
}

.error{

    color:red;

    margin-top:15px;
}

</style>
</head>
<body>
    <div class="login-box">
        <h1>管理者ログイン</h1>
        <input type="password" id="password" placeholder="パスワード">
        <input type="text" id="studentId" placeholder="4桁番号">
        <button onclick="login()">ログイン</button>
        <div class="error" id="error"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebaseコンソールで取得したconfigをここに入れます
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nankousai2026.firebaseapp.com",
        databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nankousai2026",
        storageBucket: "nankousai2026.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    window.login = async () => {
        const studentId = document.getElementById("studentId").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("error");

        // 1. パスワードの一致チェック
        if (password !== "satunannowagabokou") {
            errorDiv.innerText = "パスワードが違います";
            return;
        }

        // 2. Firebaseから許可リストを取得してチェック
        try {
            const snapshot = await get(ref(db, 'adminIds'));
            const data = snapshot.val(); // CSVのデータがここに入ります
            
            // CSVデータから学生番号が含まれているか判定
            if (data && data.includes(studentId)) {
                localStorage.setItem("loggedInStudentId", studentId);
                location.href = "admin.html";
            } else {
                errorDiv.innerText = "番号が許可されていません";
            }
        } catch (e) {
            errorDiv.innerText = "通信エラーが発生しました";
            console.error(e);
        }
    };
</script>
</body>
</html>
