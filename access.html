<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通アクセス | 南高祭2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .yuji { font-family: 'Yuji Syuku', serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <!-- ヘッダー -->
    <header class="flex items-center justify-between px-6 py-5 bg-slate-800/50 backdrop-blur sticky top-0 z-50">
        <a href="index.html" class="yuji text-2xl font-bold">南高祭2026</a>
        <button onclick="toggleMenu()" class="text-2xl hover:text-yellow-300 transition">☰</button>
    </header>

    <!-- メニュー -->
    <nav id="menu" class="hidden absolute top-20 right-4 w-64 bg-slate-800 rounded-2xl shadow-xl z-50 border border-white/10 overflow-hidden">
        <a href="index.html" class="block px-6 py-4 hover:bg-white/10 transition">ホーム</a>
        <a href="access.html" class="block px-6 py-4 hover:bg-white/10 transition">交通アクセス</a>
        <a href="stage.html" class="block px-6 py-4 hover:bg-white/10 transition">ステージ発表</a>
        <a href="street.html" class="block px-6 py-4 hover:bg-white/10 transition">ストリート発表</a>
        <a href="exhibition.html" class="block px-6 py-4 hover:bg-white/10 transition">展示一覧</a>
        <a href="map.html" class="block px-6 py-4 hover:bg-white/10 transition">会場マップ</a>
        <a href="maigo.html" class="block px-6 py-4 hover:bg-white/10 transition text-orange-400">迷子・落とし物</a>
        <a href="rally.html" class="block px-6 py-4 hover:bg-white/10 transition">スタンプラリー</a>
        <a href="rule.html" class="block px-6 py-4 hover:bg-white/10 transition">校内ルール</a>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="yuji text-4xl md:text-5xl font-bold mb-10 text-center text-yellow-300">交通アクセス</h1>

        <!-- 地図 -->
        <div class="bg-white p-2 rounded-3xl shadow-2xl mb-12 overflow-hidden">
            <iframe 
                src="https://www.google.com/maps?q=札幌南高等学校&output=embed" 
                class="w-full h-[400px] rounded-2xl" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <!-- アクセス情報 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition">
                <h3 class="text-xl font-bold text-blue-400 mb-2">幌平橋駅</h3>
                <p class="text-slate-300">徒歩 約10分</p>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition">
                <h3 class="text-xl font-bold text-blue-400 mb-2">静修学園前駅</h3>
                <p class="text-slate-300">徒歩 約7分</p>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition">
                <h3 class="text-xl font-bold text-blue-400 mb-2">中島公園入口</h3>
                <p class="text-slate-300">バス停から徒歩 約5分</p>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition">
                <h3 class="text-xl font-bold text-blue-400 mb-2">南19条西11丁目</h3>
                <p class="text-slate-300">バス停から徒歩 約3分</p>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("menu");
            menu.classList.toggle("hidden");
        }
    </script>
</body>
</html>
