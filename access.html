<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
content="width=device-width, initial-scale=1.0">

    <title>交通アクセス | 南高祭2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>

body {

    margin: 0;

    font-family: sans-serif;

    background: #f5f7fb;
}

/* ヘッダー */

.page-header {

    background: #00469b;

    padding: 15px 30px;

    display: flex;

    justify-content: space-between;

    align-items: center;
}

/* タイトル */

.site-title {

    color: white;

    text-decoration: none;

    font-size: 2rem;

    font-family:
        "Yuji Syuku",
        serif;

    transition: 0.3s;
}

.site-title:hover {

    color: #dbe8ff;
}

/* 三本線 */

.menu-button {

    color: white;

    font-size: 2rem;

    cursor: pointer;

    transition: 0.3s;
}

.menu-button:hover {

    color: #ffe066;
}

/* メニュー */

#menu {

    display: none;

    background: white;

    position: fixed;

    top: 70px;
    right: 20px;

    width: 250px;

    max-height: 70vh;

    overflow-y: auto;

    border-radius: 15px;

    box-shadow:
        0 5px 15px rgba(0,0,0,0.2);

    z-index: 9999;
}

#menu a {

    display: block;

    padding: 15px 30px;

    color: #00469b;

    text-decoration: none;

    transition:
        background 0.3s,
        color 0.3s,
        transform 0.3s;
}

#menu a:hover {

    background: #00469b;

    color: white;

    transform: translateX(-5px);
}

/* タイトル */

.page-title {

    text-align: center;

    color: #00469b;

    font-size: 2.8rem;

    margin-top: 50px;
}

/* 地図 */

.map-container {

    width: 85%;

    margin: 40px auto;

    border-radius: 20px;

    overflow: hidden;

    box-shadow:
        0 5px 20px rgba(0,0,0,0.2);
}

.map-container iframe {

    width: 100%;

    height: 500px;

    border: none;
}

/* アクセス情報 */

.access-info {

    width: 80%;

    margin: 50px auto;

    display: flex;

    justify-content: center;

    gap: 30px;

    flex-wrap: wrap;
}

.access-card {

    width:min(300px,90%);

    background: white;

    border-radius: 20px;

    padding: 30px;

    box-shadow:
        0 5px 15px rgba(0,0,0,0.15);

    transition: 0.3s;
}

.access-card:hover {

    transform: translateY(-5px);

    box-shadow:
        0 10px 20px rgba(0,0,0,0.2);
}

.station-name {

    font-size: 1.8rem;

    font-weight: bold;

    color: #00469b;

    margin-bottom: 15px;
}

.walk-time {

    font-size: 1.3rem;

    color: #333;

    line-height: 1.8;
}

/* スマホ対応 */

@media (max-width:768px){

    /* ヘッダー */

    .page-header{

        padding:15px;
    }

    .site-title{

        font-size:1.4rem;
    }

    .menu-button{

        font-size:1.8rem;
    }

    /* メニュー */

    #menu{

        width:85%;

        right:10px;

        top:65px;
    }

    #menu a{

        padding:18px;
    }

    /* タイトル */

    .page-title{

        font-size:2rem;

        margin-top:30px;
    }

    /* 地図 */

    .map-container{

        width:95%;
    }

    .map-container iframe{

        height:350px;
    }

    /* アクセス情報 */

    .access-info{

        width:95%;

        gap:15px;
    }

    .access-card{

        width:100%;

        padding:20px;
    }

    .station-name{

        font-size:1.5rem;
    }

    .walk-time{

        font-size:1.1rem;
    }
}

</style>

</head>

<body>

<header class="page-header">

    <a href="index.html"
    class="site-title">

        南高祭2026

    </a>

    <div class="menu-button"
    onclick="toggleMenu()">

        ☰

    </div>

</header>

<nav id="menu">

    <a href="index.html">ホーム</a>

    <a href="access.html">交通アクセス</a>

    <a href="stage.html">ステージ発表</a>

    <a href="street.html">ストリート発表</a>

    <a href="exhibition.html">展示一覧</a>

    <a href="map.html">会場マップ</a>

    <a href="rule.html">校内ルール</a>

</nav>

<h1 class="page-title">
    交通アクセス
</h1>

<!-- Google Map -->

<div class="map-container">

<iframe
src="https://www.google.com/maps?q=札幌南高等学校&output=embed">
</iframe>

</div>

<!-- 駅情報 -->

<div class="access-info">

    <div class="access-card">

        <div class="station-name">
            幌平橋駅
        </div>

        <div class="walk-time">
            徒歩 約10分
        </div>

    </div>

    <div class="access-card">

        <div class="station-name">
            静修学園前駅
        </div>

        <div class="walk-time">
            徒歩 約7分
        </div>

    </div>

    <div class="access-card">

        <div class="station-name">
            中島公園入口
        </div>

        <div class="walk-time">
            バス停から徒歩 約5分
        </div>

    </div>

    <div class="access-card">

        <div class="station-name">
            南19条西11丁目
        </div>

        <div class="walk-time">
            バス停から徒歩 約3分
        </div>

    </div>

</div>

<script>

function toggleMenu() {

    const menu =
        document.getElementById("menu");

    if(menu.style.display === "block") {

        menu.style.display = "none";

    } else {

        menu.style.display = "block";
    }
}

</script>

</body>
</html>
